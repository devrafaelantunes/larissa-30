<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141414;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle border -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" rx="4"/>
  
  <!-- Stars -->
  <circle cx="120" cy="100" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="340" cy="80" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="900" cy="120" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="1080" cy="90" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="200" cy="520" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1000" cy="500" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="600" cy="60" r="1" fill="rgba(255,255,255,0.25)"/>
  <circle cx="750" cy="560" r="2" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Eyebrow text -->
  <text x="600" y="190" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.3)" 
        text-anchor="middle" letter-spacing="8">VOCÊ ESTÁ CONVIDADO PARA</text>
  
  <!-- Name -->
  <text x="600" y="310" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="110" 
        fill="white" text-anchor="middle" opacity="0.95">Larissa</text>
  
  <!-- Divider -->
  <line x1="480" y1="345" x2="540" y2="345" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <circle cx="600" cy="345" r="3" fill="rgba(255,255,255,0.5)"/>
  <line x1="660" y1="345" x2="720" y2="345" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <!-- "faz 30" -->
  <text x="600" y="430" font-family="'Arial Black', 'Impact', sans-serif" font-size="96" font-weight="900"
        fill="white" text-anchor="middle" opacity="0.92">30 anos</text>
  
  <!-- Date -->
  <text x="600" y="510" font-family="Georgia, serif" font-size="22" fill="rgba(255,255,255,0.45)" 
        text-anchor="middle" letter-spacing="4">25 DE ABRIL · RIBEIRÃO PRETO</text>

  <!-- Small star accents -->
  <text x="540" y="435" font-size="18" fill="rgba(255,255,255,0.2)" text-anchor="middle">✦</text>
  <text x="660" y="435" font-size="18" fill="rgba(255,255,255,0.2)" text-anchor="middle">✦</text>
</svg>
